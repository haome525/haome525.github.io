# Site settings
title: haome525
SEOTitle: haome525的博客 | AI · 全栈 · 创造
header-img: blog/img/post-bg-desk.jpg
email: haome525@gmail.com
description: "AI 驱动 · 全栈开发 · 持续创造"
keyword: "haome525, AI, 人工智能, 全栈开发, iOS, RaaS, 博客"
url: "http://haome525.github.io"
baseurl: ""
github_repo: "https://github.com/haome525/haome525.github.io.git"

# Sidebar settings
sidebar: true
sidebar-about-description: "Goals determine what you going to be!"
sidebar-avatar: /blog/img/about-BY-gentle.jpg

# SNS settings
RSS: false
zhihu_username: haome525
github_username: haome525

# Build settings
permalink: /blog/:year/:month/:day/:title/
paginate: 10
paginate_path: "/blog/page:num/"
exclude: ["less","node_modules","README.md","preview_server.py"]
anchorjs: true

# Gems
plugins:
  - jekyll-paginate

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

