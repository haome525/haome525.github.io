<!-- Navigation (Original - kept for blog compatibility) -->
<nav class="navbar navbar-default navbar-custom navbar-fixed-top">
    <div class="container-fluid">
        <div class="navbar-header page-scroll">
            <button type="button" class="navbar-toggle">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
        </div>

        <div id="huxblog_navbar">
            <div class="navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="{{ site.baseurl }}/">首页</a></li>
                    <li><a href="{{ site.baseurl }}/nav/">精选</a></li>
                    <li><a href="{{ site.baseurl }}/navigation/">导航</a></li>
                    <li><a href="{{ site.baseurl }}/works/">作品</a></li>
                    <li><a href="{{ site.baseurl }}/projects/">项目</a></li>
                    <li><a href="{{ site.baseurl }}/blog/">博客</a></li>
                    <li><a href="{{ site.baseurl }}/articles/">文章</a></li>
                    <li><a href="{{ site.baseurl }}/tech/">技术</a></li>
                    <li><a href="{{ site.baseurl }}/tools/">工具</a></li>
                    <li><a href="{{ site.baseurl }}/life/">周边</a></li>
                    <li><a href="{{ site.baseurl }}/about/">关于</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>
<script>
    var $body   = document.body;
    var $toggle = document.querySelector('.navbar-toggle');
    var $navbar = document.querySelector('#huxblog_navbar');
    var $collapse = document.querySelector('.navbar-collapse');

    var __HuxNav__ = {
        close: function(){
            $navbar.className = " ";
            setTimeout(function(){
                if($navbar.className.indexOf('in') < 0) {
                    $collapse.style.height = "0px"
                }
            },400)
        },
        open: function(){
            $collapse.style.height = "auto"
            $navbar.className += " in";
        }
    }

    $toggle.addEventListener('click', function(e){
        if ($navbar.className.indexOf('in') > 0) {
            __HuxNav__.close()
        }else{
            __HuxNav__.open()
        }
    })

    document.addEventListener('click', function(e){
        if(e.target == $toggle) return;
        if(e.target.className == 'icon-bar') return;
        __HuxNav__.close();
    })
</script>
